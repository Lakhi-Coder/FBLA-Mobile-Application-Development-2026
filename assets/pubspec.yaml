name: fbla_connect
description: "FBLA Mobile Application Development Competition Entry"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core - 2025 versions
  firebase_core: ^3.7.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.3.0
  
  # UI & State Management
  provider: ^6.1.1
  cupertino_icons: ^1.0.2
  
  # Optional but useful for FBLA
  intl: ^0.19.0
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.14.4
  webview_flutter: ^4.13.0
  font_awesome_flutter: ^11.0.0
  table_calendar: ^3.1.3
  image_picker: ^1.2.1
  http: ^1.6.0
  share_plus: ^12.0.1
  flutter_dotenv: ^6.0.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: "fblaconnect_icon" 
  ios: true 
  macos: 
    generate: true 
    image_path: "images/main_images/FBLA_macos_icon.png"
  image_path: "images/main_images/FBLA Template.png"

flutter:
  uses-material-design: true
  
  assets:
    - images/main_images/highschool/FBLA_high_school.jpg 
    - images/main_images/initial/fbla_app_image_modern.png 
    - images/main_images/initial/mobile_fbla_app_image.png
    - images/main_images/initial/desktop_fbla_app_image.png
    - images/main_images/initial/tablet_fbla_app_image.png
    - images/brand_icons/FBLA_Logo_Horizontal_color-HiRes.png